version: "3.9"

services:
  db:
    image: postgres:15
    container_name: nifty100_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: nifty_admin
      POSTGRES_PASSWORD: nifty_secret_2024
      POSTGRES_DB: nifty100_warehouse
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: nifty100_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  pgdata:
